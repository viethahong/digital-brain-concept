<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Room | Emerald Intelligence</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="stats.js"></script>
    <script src="inquiry.js"></script>
    <style>
        .room-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            .room-grid {
                grid-template-columns: 1fr;
            }
        }
        .inquiry-scroll {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 1rem;
        }
        .inquiry-card {
            background: rgba(80, 200, 120, 0.05);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 20px;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }
        .inquiry-card:hover {
            border-color: var(--primary-color);
            background: rgba(80, 200, 120, 0.1);
            transform: scale(1.02);
        }
        .inquiry-type {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            font-weight: 800;
        }
        .input-forge {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid var(--border-color);
            border-radius: 30px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        #brain-thought {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 1.5rem;
            border-radius: 20px;
            font-family: inherit;
            font-size: 1.1rem;
            line-height: 1.6;
            resize: none;
            height: 300px;
        }
        #brain-thought:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(80, 200, 120, 0.2);
        }
        .forge-status {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-ingest {
            background: var(--primary-color);
            color: var(--bg-color);
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-ingest:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(80, 200, 120, 0.4);
        }
    </style>
</head>
<body>
    <div class="background-glow"></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Digital Brain</a>
            <div class="nav-links">
                <a href="index.html">Dashboard</a>
                <a href="brain_room.html" class="active">Brain Room</a>
                <a href="wiki_hub.html">Wiki Hub</a>
                <a href="graph.html">Knowledge Graph</a>
                <a href="learn.html">Learn</a>
                <a href="chat.html">Chat</a>
                <button id="theme-toggle" class="theme-toggle" title="Chuyển chế độ Sáng/Tối">☀️</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="hero" style="text-align: left; margin-bottom: 2rem;">
            <h1 class="glitch" style="font-size: 3rem;">Brain Room</h1>
            <p class="subtitle">Phòng Phẫu thuật & Nâng cấp Tri thức</p>
        </header>

        <div class="room-grid">
            <!-- CÂU HỎI GỢI MỞ -->
            <section>
                <h3 style="margin-bottom: 1.5rem; color: var(--primary-color);">🔍 Knowledge Gaps</h3>
                <div class="inquiry-scroll" id="inquiry-list">
                    <!-- Cards rendered by JS -->
                </div>
            </section>

            <!-- KHU VỰC NẠP TRI THỨC -->
            <section class="input-forge">
                <div class="forge-status">
                    <span>STATUS: <strong>READY TO INGEST</strong></span>
                    <span id="char-count">0 chars</span>
                </div>
                <textarea id="brain-thought" placeholder="Viết những suy nghĩ, trải nghiệm mới hoặc dán nội dung file .md vào đây để AI tiêu hóa..."></textarea>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <small style="color: var(--text-secondary); max-width: 60%;">Nhấn nút Gửi để lưu vào file raw/ và bắt đầu quá trình Ingest tự động.</small>
                    <button class="btn-ingest" onclick="handleIngest()">GIEO MẦM TRI THỨC 🌱</button>
                </div>
            </section>
        </div>
    </main>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav">
        <div class="mobile-nav-container">
            <a href="index.html" class="mobile-nav-item"><span>🏠</span>Dashboard</a>
            <a href="brain_room.html" class="mobile-nav-item active"><span>🛠️</span>Room</a>
            <a href="wiki_hub.html" class="mobile-nav-item"><span>📚</span>Wiki</a>
            <a href="chat.html" class="mobile-nav-item"><span>💬</span>Chat</a>
            <a href="learn.html" class="mobile-nav-item"><span>🎓</span>Learn</a>
        </div>
    </nav>

    <script src="theme.js"></script>
    <script>
        // Render inquiries from BRAIN_INQUIRIES
        function renderInquiries() {
            const container = document.getElementById('inquiry-list');
            if (typeof BRAIN_INQUIRIES === 'undefined' || BRAIN_INQUIRIES.length === 0) {
                container.innerHTML = '<p class="empty-hint">Bộ não đang ổn định, chưa tìm thấy lỗ hổng nào...</p>';
                return;
            }

            BRAIN_INQUIRIES.forEach(item => {
                const card = document.createElement('div');
                card.className = 'inquiry-card';
                card.onclick = () => {
                    document.getElementById('brain-thought').value = `Phản hồi cho tri thức [[${item.title}]]: \n\n`;
                    document.getElementById('brain-thought').focus();
                };
                card.innerHTML = `
                    <div class="inquiry-type">${item.type.replace('_', ' ')}</div>
                    <p style="margin: 0; font-size: 1.1rem; line-height: 1.4;">${item.question}</p>
                `;
                container.appendChild(card);
            });
        }

        // Handle text input
        document.getElementById('brain-thought').oninput = function() {
            document.getElementById('char-count').innerText = this.value.length + " chars";
        };

        async function handleIngest() {
            const content = document.getElementById('brain-thought').value;
            if (!content.trim()) return alert("Vui lòng nhập nội dung!");
            
            const btn = document.querySelector('.btn-ingest');
            const originalText = btn.innerText;
            btn.innerText = 'AI ĐANG TIÊU HÓA... ⏳';
            btn.disabled = true;

            try {
                const response = await fetch('/ingest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    btn.innerText = 'ĐÃ LƯU THÀNH CÔNG! ✅';
                    btn.style.background = '#00ff88';
                    btn.style.color = '#000';
                    alert(`Tri thức đã được phân loại là [${result.type.toUpperCase()}] và lưu tại:\n${result.path}`);
                    
                    document.getElementById('brain-thought').value = "";
                    document.getElementById('char-count').innerText = "0 chars";
                    
                    setTimeout(() => {
                        btn.innerText = originalText;
                        btn.style.background = '';
                        btn.style.color = '';
                        btn.disabled = false;
                    }, 3000);
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error("Ingest failed:", error);
                alert(`Lỗi: ${error.message}\nĐảm bảo Brain Engine đang chạy (python3 brain_server.py).`);
                btn.innerText = 'THỬ LẠI';
                btn.disabled = false;
            }
        }

        renderInquiries();
    </script>
</body>
</html>
