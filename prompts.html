        rel="stylesheet">
    <style>
        .questions-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .random-box {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(80, 200, 120, 0.1) 0%, rgba(0, 255, 136, 0.1) 100%);
            border: 2px dashed var(--primary-color);
            padding: 3rem;
            text-align: center;
            border-radius: 32px;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            animation: borderPulse 3s infinite;
        }

        @keyframes borderPulse {
            0% {
                border-color: var(--primary-color);
            }

            50% {
                border-color: var(--accent-color);
            }

            100% {
                border-color: var(--primary-color);
            }
        }

        .random-text {
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 2rem;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-magic {
            background: var(--primary-color);
            color: var(--bg-color);
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(80, 200, 120, 0.3);
        }

        .btn-magic:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(80, 200, 120, 0.5);
            background: var(--accent-color);
        }

        .category-title {
            font-size: 1.2rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary-color);
            padding-left: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .prompt-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 1.2rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .prompt-item:hover {
            background: rgba(80, 200, 120, 0.1);
            border-color: var(--primary-color);
            transform: translateX(5px);
        }

        .copy-hint {
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0;
            transition: var(--transition);
        }

        .prompt-item:hover .copy-hint {
            opacity: 1;
        }
    </style>
</head>

        let currentFilter = 'all';

        function setFilter(category) {
            currentFilter = category;
            
            // Update UI buttons
            document.querySelectorAll('.question-chip').forEach(btn => {
                btn.style.background = 'rgba(80, 200, 120, 0.1)';
                btn.style.color = 'var(--primary-color)';
            });
            const activeBtn = document.getElementById('filter-' + category);
            if (activeBtn) {
                activeBtn.style.background = 'var(--primary-color)';
                activeBtn.style.color = 'var(--bg-color)';
            }

            filterList();
        }

        function generateRandom() {
            const el = document.getElementById('random-prompt');
            el.style.opacity = '0';
            setTimeout(() => {
                const filtered = currentFilter === 'all' 
                    ? allPrompts 
                    : allPrompts.filter(p => p.category === currentFilter);
                
                const random = filtered[Math.floor(Math.random() * filtered.length)].text;
                el.innerText = random;
                el.style.opacity = '1';
                el.style.animation = 'fadeInDown 0.5s ease-out';
            }, 300);
        }

        function filterList() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('questions-list');
            container.innerHTML = '';

            const filtered = allPrompts.filter(p => {
                const matchesFilter = currentFilter === 'all' || p.category === currentFilter;
                const matchesSearch = p.text.toLowerCase().includes(searchTerm);
                return matchesFilter && matchesSearch;
            });

            // Group by category to maintain structure
            const categories = {
                onboarding: "01. Nhập cuộc (Onboarding)",
                knowledge: "02. Tri thức & Kinh nghiệm",
                relationships: "03. Mối quan hệ thực thể",
                principles: "04. Hệ niềm tin & Nguyên tắc"
            };

            for (const [key, title] of Object.entries(categories)) {
                const items = filtered.filter(p => p.category === key).slice(0, 5);
                if (items.length > 0) {
                    const section = document.createElement('div');
                    section.innerHTML = `<h3 class="category-title">${title}</h3>`;
                    items.forEach(p => {
                        const item = document.createElement('div');
                        item.className = 'prompt-item';
                        item.onclick = function() { copyToClipboard(this); };
                        item.innerHTML = `<span>${p.text}</span> <span class="copy-hint">Copy</span>`;
                        section.appendChild(item);
                    });
                    container.appendChild(section);
                }
            }
        }

        function copyToClipboard(el) {
            const text = el.querySelector('span').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalColor = el.style.borderColor;
                const originalBg = el.style.background;
                el.style.borderColor = "#00ff88";
                el.style.background = "rgba(0, 255, 136, 0.1)";
                const hint = el.querySelector('.copy-hint');
                hint.innerText = "Copied!";
                hint.style.opacity = "1";
                setTimeout(() => {
                    el.style.borderColor = originalColor;
                    el.style.background = originalBg;
                    hint.innerText = "Copy";
                }, 2000);
            });
        }

        // Initial render
        filterList();
    </script>
</body>
</html>
